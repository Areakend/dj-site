<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Stats Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #00ddff;
            margin: 10px 0;
        }
        .genre-bar-container {
            margin-bottom: 15px;
        }
        .genre-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .genre-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .genre-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ddff, #7000ff);
        }
        .top-track-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .top-track-item:last-child { border-bottom: none; }
        .track-rank { width: 30px; font-weight: 700; color: rgba(255,255,255,0.3); }
        .track-details { flex: 1; }
        .track-votes { font-weight: 700; color: #00ddff; }
    </style>
</head>
<body class="is-admin">
    <div class="background">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container" style="max-width: 1000px;">
        <header>
            <div class="logo">STATS<span>DASHBOARD</span></div>
            <div class="nav-links">
                <a href="index.html">Live View</a>
                <a href="vote.html">Vote Page</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Engagement</h3>
                <div id="totalVotes" class="stat-value">0</div>
                <p>votes enregistrés au total</p>
            </div>
            <div class="stat-card">
                <h3>Music Base</h3>
                <div id="totalSongs" class="stat-value">0</div>
                <p>titres disponibles dans la base</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Populaire par Genre</h3>
                <div id="genreStatsList"></div>
            </div>
            <div class="stat-card">
                <h3>Top 10 Tracks</h3>
                <div id="topTracksList"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/music_db.js"></script>
    <script src="js/data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.DJAuth) {
                window.DJAuth.init(window.firebaseApp);
                window.DJAuth.onAuthChange((user) => {
                    if (!user || !window.DJAuth.isAdmin()) {
                        window.location.href = 'index.html';
                    }
                });
            }

            window.DJData.subscribe(() => {
                const stats = window.DJData.getStats();
                document.getElementById('totalVotes').textContent = stats.totalVotes.toLocaleString();
                document.getElementById('totalSongs').textContent = stats.totalSongs.toLocaleString();

                // Render Genres
                const genreList = document.getElementById('genreStatsList');
                genreList.innerHTML = '';
                const maxGenreVotes = Math.max(...stats.genres.map(g => g.votes)) || 1;
                
                stats.genres.slice(0, 8).forEach(g => {
                    const pct = (g.votes / maxGenreVotes) * 100;
                    genreList.innerHTML += `
                        <div class="genre-bar-container">
                            <div class="genre-info">
                                <span>${g.name}</span>
                                <span>${g.votes} votes (${g.count} titres)</span>
                            </div>
                            <div class="genre-bar">
                                <div class="genre-fill" style="width: ${pct}%"></div>
                            </div>
                        </div>
                    `;
                });

                // Render Top Tracks
                const trackList = document.getElementById('topTracksList');
                trackList.innerHTML = '';
                stats.topTracks.forEach((t, i) => {
                    if (t.votes > 0) {
                        trackList.innerHTML += `
                            <div class="top-track-item">
                                <div class="track-rank">${i+1}</div>
                                <div class="track-details">
                                    <div style="font-weight: 500">${t.title}</div>
                                    <div style="font-size: 12px; color: rgba(255,255,255,0.5)">${t.artist}</div>
                                </div>
                                <div class="track-votes">${t.votes}</div>
                            </div>
                        `;
                    }
                });
            });
        });
    </script>
</body>
</html>
