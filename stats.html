<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Stats Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00ddff;
            --accent-purple: #7000ff;
        }

        body {
            background: #050505;
            color: #fff;
            overflow-x: hidden;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .genre-bar-container {
            margin-bottom: 20px;
        }

        .genre-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .genre-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .genre-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-purple));
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top-track-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: opacity 0.2s ease;
        }

        .top-track-item:hover { opacity: 0.8; }
        .top-track-item:last-child { border-bottom: none; }

        .track-rank { 
            width: 40px; 
            font-size: 20px;
            font-weight: 700; 
            color: rgba(255,255,255,0.1); 
        }

        .track-details { flex: 1; min-width: 0; }
        .track-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .track-artist { font-size: 13px; color: rgba(255,255,255,0.4); }
        .track-votes { 
            font-weight: 700; 
            padding: 4px 10px;
            background: rgba(0, 221, 255, 0.1);
            color: var(--accent);
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body class="stats-page">
    <div class="background">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container" style="max-width: 1000px;">
        <header>
            <div class="logo">STATS<span>DASHBOARD</span></div>
            <div class="nav-links">
                <a href="index.html">Live View</a>
                <a href="vote.html">Vote Page</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Engagement</div>
                <div id="totalVotes" class="stat-value">0</div>
                <p style="font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 10px;">votes enregistrés au total</p>
            </div>
            <div class="stat-card">
                <div class="stat-label">Music Base</div>
                <div id="totalSongs" class="stat-value">0</div>
                <p style="font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 10px;">titres disponibles dans la base</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 class="section-title">Populaire par Genre</h3>
                <div id="genreStatsList"></div>
            </div>
            <div class="stat-card">
                <h3 class="section-title">Top 10 Tracks</h3>
                <div id="topTracksList"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/music_db.js"></script>
    <script src="js/data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.DJAuth) {
                window.DJAuth.init(window.firebaseApp);
            }

            window.DJData.subscribe(() => {
                const stats = window.DJData.getStats();
                document.getElementById('totalVotes').textContent = stats.totalVotes.toLocaleString();
                document.getElementById('totalSongs').textContent = stats.totalSongs.toLocaleString();

                // Render Genres
                const genreList = document.getElementById('genreStatsList');
                genreList.innerHTML = '';
                const maxGenreVotes = Math.max(...stats.genres.map(g => g.votes)) || 1;
                
                stats.genres.slice(0, 8).forEach(g => {
                    const pct = (g.votes / maxGenreVotes) * 100;
                    genreList.innerHTML += `
                        <div class="genre-bar-container">
                            <div class="genre-info">
                                <span>${g.name}</span>
                                <span>${g.votes} votes (${g.count} titres)</span>
                            </div>
                            <div class="genre-bar">
                                <div class="genre-fill" style="width: ${pct}%"></div>
                            </div>
                        </div>
                    `;
                });

                // Render Top Tracks
                const trackList = document.getElementById('topTracksList');
                trackList.innerHTML = '';
                stats.topTracks.forEach((t, i) => {
                    if (t.votes > 0) {
                        trackList.innerHTML += `
                            <div class="top-track-item">
                                <div class="track-rank">${i+1}</div>
                                <div class="track-details">
                                    <div class="track-title">${t.title}</div>
                                    <div class="track-artist">${t.artist}</div>
                                </div>
                                <div class="track-votes">${t.votes}</div>
                            </div>
                        `;
                    }
                });
            });
        });
    </script>
</body>
</html>
