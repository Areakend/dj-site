<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Stats Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00ddff;
            --accent-purple: #7000ff;
        }

        body {
            background: #050505;
            color: #fff;
            overflow-x: hidden;
            margin: 0;
            min-height: 100vh;
        }


        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .stat-label {
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .genre-bar-container {
            margin-bottom: 20px;
        }

        .genre-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .genre-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .genre-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-purple));
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top-track-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: opacity 0.2s ease;
        }

        .top-track-item:hover { opacity: 0.8; }
        .top-track-item:last-child { border-bottom: none; }

        .track-rank { 
            width: 40px; 
            font-size: 20px;
            font-weight: 700; 
            color: rgba(255,255,255,0.1); 
        }

        .track-details { flex: 1; min-width: 0; }
        .track-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .track-artist { font-size: 13px; color: rgba(255,255,255,0.4); }
        .track-votes { 
            font-weight: 700; 
            padding: 4px 10px;
            background: rgba(0, 221, 255, 0.1);
            color: var(--accent);
            border-radius: 8px;
            font-size: 14px;
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .reset-btn {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.3);
            color: #ff5555;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: rgba(255, 50, 50, 0.2);
            border-color: #ff5555;
        }
    </style>
</head>
<body class="stats-page">
    <div class="background">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <nav class="main-nav">
        <div class="nav-links">
            <button id="authBtn" class="nav-link" style="background:none; border:none; cursor:pointer;">Login</button>
            <a href="index.html" class="nav-link">Visuals</a>
            <a href="vote.html" class="nav-link">Vote</a>
            <a href="stats.html" class="nav-link active">Stats</a>
        </div>
    </nav>

    <div class="app-container" style="max-width: 1200px; margin: 0 auto;">
        <header class="stats-header">
            <div>
                <h1 class="glow-text">ALL-TIME STATS</h1>
                <p style="opacity: 0.6; margin-top: 5px;">Persistent history & engagement</p>
            </div>
            <div id="adminControls" style="display: none;">
                <button id="resetHistoryBtn" class="reset-btn">Reset All-Time Stats</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Engagement</div>
                <div id="totalVotes" class="stat-value">0</div>
                <p style="font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 10px;">votes enregistrés au total</p>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Plays</div>
                <div id="totalPlays" class="stat-value">0</div>
                <p style="font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 10px;">diffusions totales</p>
            </div>
            <div class="stat-card">
                <div class="stat-label">Music Base</div>
                <div id="totalSongs" class="stat-value">0</div>
                <p style="font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 10px;">titres disponibles dans la base</p>
            </div>
        </div>

        <div class="stats-detailed-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 25px;">
            <div class="stat-card">
                <h3 class="section-title">Popular Genres</h3>
                <div id="genreStatsList"></div>
            </div>
            <div class="stat-card">
                <h3 class="section-title">Top Voted Tracks</h3>
                <div id="topTracksList"></div>
            </div>
            <div class="stat-card">
                <h3 class="section-title">Most Played Tracks</h3>
                <div id="mostPlayedList"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v9 Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Compatibility layer
        window.firebaseApp = firebase;
        window.firebaseAuth = {
            getAuth: firebase.auth,
            GoogleAuthProvider: firebase.auth.GoogleAuthProvider,
            signInWithPopup: (auth, provider) => auth.signInWithPopup(provider),
            signOut: (auth) => auth.signOut(),
            onAuthStateChanged: (auth, cb) => auth.onAuthStateChanged(cb)
        };
        window.firebaseFirestore = firebase.firestore;
    </script>

    <script src="js/firebase-config.js"></script>
    <script>
        firebase.initializeApp(window.firebaseConfig);
    </script>
    <script src="js/auth.js"></script>
    <script src="js/music_db.js"></script>
    <script src="js/data.js"></script>
    <script src="js/migrate_db.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.DJAuth) {
                window.DJAuth.init(window.firebaseApp);
            }

            window.DJData.subscribe(() => {
                const stats = window.DJData.getStats();
                document.getElementById('totalVotes').textContent = stats.totalVotes.toLocaleString();
                document.getElementById('totalPlays').textContent = stats.totalPlays.toLocaleString();
                document.getElementById('totalSongs').textContent = stats.totalSongs.toLocaleString();

                // Admin Controls
                const isAdmin = window.DJAuth?.isAdmin();
                document.getElementById('adminControls').style.display = isAdmin ? 'block' : 'none';

                // Render Genres
                const genreList = document.getElementById('genreStatsList');
                genreList.innerHTML = '';
                const maxGenreVotes = Math.max(...stats.genres.map(g => g.votes)) || 1;
                
                stats.genres.slice(0, 8).forEach(g => {
                    const pct = (g.votes / maxGenreVotes) * 100;
                    genreList.innerHTML += `
                        <div class="genre-bar-container">
                            <div class="genre-info">
                                <span>${g.name}</span>
                                <span>${g.votes} votes</span>
                            </div>
                            <div class="genre-bar">
                                <div class="genre-fill" style="width: ${pct}%"></div>
                            </div>
                        </div>
                    `;
                });

                // Render Top Tracks
                const trackList = document.getElementById('topTracksList');
                trackList.innerHTML = '';
                stats.topTracks.forEach((t, i) => {
                    if (t.allTimeVotes > 0) {
                        trackList.innerHTML += `
                            <div class="top-track-item">
                                <div class="track-rank">${i+1}</div>
                                <div class="track-details">
                                    <div class="track-title">${t.title}</div>
                                    <div class="track-artist">${t.artist}</div>
                                </div>
                                <div class="track-votes">${t.allTimeVotes}</div>
                            </div>
                        `;
                    }
                });

                // Render Most Played
                const playedList = document.getElementById('mostPlayedList');
                playedList.innerHTML = '';
                stats.mostPlayed.forEach((t, i) => {
                    if (t.playCount > 0) {
                        playedList.innerHTML += `
                            <div class="top-track-item">
                                <div class="track-rank">${i+1}</div>
                                <div class="track-details">
                                    <div class="track-title">${t.title}</div>
                                    <div class="track-artist">${t.artist}</div>
                                </div>
                                <div class="track-votes">${t.playCount} diffusions</div>
                            </div>
                        `;
                    }
                });
            });

            // Reset History Handler
            document.getElementById('resetHistoryBtn').onclick = async () => {
                if (await window.DJData.resetHistory()) {
                    alert("Historique réinitialisé avec succès.");
                }
            };
        });
    </script>
</body>
</html>
